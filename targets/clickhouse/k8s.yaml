apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoopt-clickhouse
  labels:
    app: autoopt-clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoopt-clickhouse
  template:
    metadata:
      labels:
        app: autoopt-clickhouse
    spec:
      containers:
      - name: clickhouse
        image: ${IMAGE_NAME}
        imagePullPolicy: IfNotPresent
        env:
        - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
          value: "1"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          value: ""
        resources:
          requests:
            cpu: "${RESOURCE_REQUESTS_CPU}"
            memory: "${RESOURCE_REQUESTS_MEMORY}"
          limits:
            cpu: "${RESOURCE_LIMITS_CPU}"
            memory: "${RESOURCE_LIMITS_MEMORY}"
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: native
        readinessProbe:
          httpGet:
            path: /ping
            port: 8123
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /ping
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: autoopt-clickhouse
spec:
  selector:
    app: autoopt-clickhouse
  ports:
  - port: 8123
    targetPort: 8123
    name: http
  - port: 9000
    targetPort: 9000
    name: native
